# ══════════════════════════════════════════════════
#  Nginx Reverse Proxy — Inventario TI Elecnor
#  Modo: HTTP local (sin SSL)
#  Para producción con SSL ver nginx.conf.ssl-template
# ══════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # ── Frontend React ────────────────────────────
    location / {
        proxy_pass         http://inventario_frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API Django ────────────────────────────────
    location /api/ {
        proxy_pass         http://inventario_web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Admin Django ──────────────────────────────
    location /admin/ {
        proxy_pass         http://inventario_web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Archivos media (PDFs de actas, etc.) ──────
    location /media/ {
        proxy_pass         http://inventario_web:8000;
        proxy_set_header   Host              $host;
    }

    # ── Static Django ─────────────────────────────
    location /static/ {
        proxy_pass         http://inventario_web:8000;
        proxy_set_header   Host              $host;
    }
}
