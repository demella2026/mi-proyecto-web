version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: inventario_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventario_db
      POSTGRES_USER: inventario_user
      POSTGRES_PASSWORD: inventario_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventario_user -d inventario_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ────────────────────────────────────────────
  #  Aplicación Django / DRF
  # ────────────────────────────────────────────
  web:
    build: .
    container_name: inventario_web
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: "clave-secreta-cambiar-en-produccion-abc123"
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: inventario_db
      POSTGRES_USER: inventario_user
      POSTGRES_PASSWORD: inventario_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles

  # ── React Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventario_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  static_files: