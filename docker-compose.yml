
services:
  db:
    image: postgres:16-alpine
    container_name: inventario_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventario_user -d inventario_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: inventario_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db  # Sobrescribimos localhost por 'db' dentro de Docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - .:/app  # ESTO ES NUEVO: Sincroniza tu código local con el contenedor

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventario_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  static_files: